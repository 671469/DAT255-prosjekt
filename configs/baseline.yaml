model:
  n_layers: 8  #Transformer-blokker.
  n_heads: 8  #attention heads i hver transformer layer.
  d_model: 512   #dimensjonen på embeddding aka n_embd.
  context_length: 384   #hvor mange tokens modellen ser samtidig, aka block_size.
  ff_mult: 4 #Hvor mye vi utvider embedding-dimensjonen i feed-forward-laget.
  dropout: 0.3 #Dropout i modellen.

training:
  batch_size: 8  #hvor mange sekvenser pr treningsstep.
  lr: 8e-5  #learning rate.
  max_iters: 300000  #hvor mange treningsteps.
  eval_interval: 200  # Hvor ofte vi evaluerer og logger.
  eval_iters: 100  # Hvor mange batches vi bruker når vi estimerer loss.
  device: "cuda"  # Bruk GPU hvis tilgjengelig.
  weight_decay: 0.02 # Weight decay for regularisering i AdamW.
  grad_clip: 1.0 # Klipper gradientnormen for å unngå eksploderende gradients.
  early_stopping: true  # Stopper trening hvis val-loss ikke forbedres.
  patience: 70  # Hvor mange eval-runder vi tåler uten forbedring, aka hvor lenge skal vi vente.
  min_delta: 0.0005  # Minste forbedring i val-loss som teller som ekte forbedring, aka hva er "forbedring".
  train_ratio: 0.9 # Andel av data som brukes til trening.
  val_ratio: 0.05 # Andel av data som brukes til validering (resten brukes til test).
  min_lr: 5e-6 # Laveste learning rate mot slutten av treningen (cosine decay).
  warmup_iters: 1000 # Antall steg hvor learning rate økes gradvis fra 0 til lr.

logging:
  use_wandb: true  # Logge til Weights & Biases.
  entity: "671469-h-gskulen-p-vestlandet"  # W&B entity/team.
  project: "Test-Linn"
  #project: "mini-shakespeare-gpt"  # Prosjektnavn i W&B.
  run_name: "baseline"  # Navn på denne run-en.

checkpoint:
  out_dir: "models"  # Mappe der modellen lagres.
  save_path: "models/shakespeare_model.pt"  # Filsti til lagret modell.

generation:
  prompt: "Thou art" # starttekst for generering.
  max_new_tokens: 300  # hvor mange nye tokens som skal genereres.
  temperature: 0.65  # styrer hvor tilfeldig output er.
  do_sample: true  # om vi sampler eller velger mest sannsynlige token.
  top_k: 30  # sample kun fra de k mest sannsynlige tokenene.
  # top_p: null  # nucleus sampling.
  repetition_penalty: 1.25 
  no_repeat:ngram_size: 4

tokenizer:
  type: "bpe"  # "char" eller "bpe".
  vocab_size: 512  # størrelse på BPE-vokabular.
  min_frequency: 1  # minste frekvens for BPE-token.
  model_path: models/bpe_tokenizer_train_only.json # hvor tokenizer lagres / lastes fra